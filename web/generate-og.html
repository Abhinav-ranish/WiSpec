<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OG Image Generator</title>
  <style>
    body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    canvas { box-shadow: 0 4px 40px rgba(0,0,0,0.5); }
    #download { position: fixed; top: 20px; right: 20px; padding: 12px 24px; background: #00e5ff; color: #06080d; border: none; border-radius: 6px; font: 600 14px sans-serif; cursor: pointer; }
  </style>
</head>
<body>
  <canvas id="c" width="1200" height="630"></canvas>
  <button id="download">Download PNG</button>
  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    const W = 1200, H = 630;

    // Background
    const bgGrad = ctx.createLinearGradient(0, 0, W, H);
    bgGrad.addColorStop(0, '#06080d');
    bgGrad.addColorStop(1, '#0b0e14');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // Radial glow
    const glow = ctx.createRadialGradient(W*0.5, H*0.38, 0, W*0.5, H*0.5, W*0.5);
    glow.addColorStop(0, 'rgba(0, 229, 255, 0.07)');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(0, 229, 255, 0.035)';
    ctx.lineWidth = 0.5;
    for (let y = 0; y < H; y += 60) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    for (let x = 0; x < W; x += 60) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }

    // 2.4 GHz wave (cyan)
    function drawWave(yCenter, freq, amp, color, alpha, lw) {
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.globalAlpha = alpha;
      ctx.lineWidth = lw;
      for (let x = 0; x <= W; x += 2) {
        const envelope = Math.sin((x / W) * Math.PI) * 0.7 + 0.3;
        const y = yCenter + Math.sin(x * freq * 0.008) * amp * envelope;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    drawWave(H * 0.62, 1.0, 35, '#00e5ff', 0.1, 2);
    drawWave(H * 0.62, 1.3, 25, '#00e5ff', 0.06, 1.2);
    drawWave(H * 0.62, 2.5, 20, '#39ff14', 0.08, 1.5);
    drawWave(H * 0.62, 2.8, 15, '#39ff14', 0.04, 1);

    // Top accent bar
    const accentGrad = ctx.createLinearGradient(0, 0, W, 0);
    accentGrad.addColorStop(0, '#00e5ff');
    accentGrad.addColorStop(1, '#39ff14');
    ctx.fillStyle = accentGrad;
    ctx.fillRect(0, 0, W, 3);

    // Logo icon
    const lx = 100, ly = 155;
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(lx, ly, 26, 0, Math.PI * 2); ctx.stroke();
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(lx, ly, 14, Math.PI, 0); ctx.stroke();
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(lx, ly, 22, Math.PI, 0); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#00e5ff';
    ctx.beginPath(); ctx.arc(lx, ly, 3.5, 0, Math.PI * 2); ctx.fill();

    // Title
    ctx.font = '800 68px system-ui, -apple-system, "Segoe UI", sans-serif';
    ctx.fillStyle = '#e6edf3';
    ctx.fillText('Wi', 152, 175);
    const wiWidth = ctx.measureText('Wi').width;

    const titleGrad = ctx.createLinearGradient(152 + wiWidth, 0, 152 + wiWidth + 200, 0);
    titleGrad.addColorStop(0, '#00e5ff');
    titleGrad.addColorStop(1, '#39ff14');
    ctx.fillStyle = titleGrad;
    ctx.fillText('Spec', 152 + wiWidth, 175);

    // Subtitle
    ctx.font = '500 19px "Courier New", monospace';
    ctx.fillStyle = '#8b949e';
    ctx.fillText('Commodity Dual-Band Wi-Fi Spectroscopy', 100, 225);

    // Description
    ctx.font = '400 21px system-ui, -apple-system, sans-serif';
    ctx.fillStyle = '#8b949e';
    ctx.fillText('Classify building materials using off-the-shelf Wi-Fi hardware.', 100, 285);
    ctx.fillText('Dual-band frequency-differential attenuation achieves', 100, 315);
    ctx.font = '600 21px system-ui, -apple-system, sans-serif';
    ctx.fillStyle = '#00e5ff';
    ctx.fillText('91% classification accuracy.', 100, 345);

    // Stats bar background
    const sbx = 100, sby = 405, sbw = 520, sbh = 80;
    ctx.fillStyle = '#111620';
    ctx.strokeStyle = '#1c2333';
    ctx.lineWidth = 1;
    roundRect(ctx, sbx, sby, sbw, sbh, 8);
    ctx.fill();
    ctx.stroke();

    // Stat: Accuracy
    ctx.font = '700 30px "Courier New", monospace';
    ctx.fillStyle = '#00e5ff';
    ctx.fillText('91%', sbx + 30, sby + 40);
    ctx.font = '500 11px system-ui, sans-serif';
    ctx.fillStyle = '#484f58';
    ctx.fillText('ACCURACY', sbx + 30, sby + 60);

    // Divider
    ctx.strokeStyle = '#1c2333';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(sbx + 150, sby + 15); ctx.lineTo(sbx + 150, sby + 65); ctx.stroke();

    // Stat: Materials
    ctx.font = '700 30px "Courier New", monospace';
    ctx.fillStyle = '#00e5ff';
    ctx.fillText('6', sbx + 180, sby + 40);
    ctx.font = '500 11px system-ui, sans-serif';
    ctx.fillStyle = '#484f58';
    ctx.fillText('MATERIALS', sbx + 180, sby + 60);

    // Divider
    ctx.beginPath(); ctx.moveTo(sbx + 290, sby + 15); ctx.lineTo(sbx + 290, sby + 65); ctx.stroke();

    // Stat: Hardware
    ctx.font = '700 30px "Courier New", monospace';
    ctx.fillStyle = '#00e5ff';
    ctx.fillText('<$200', sbx + 320, sby + 40);
    ctx.font = '500 11px system-ui, sans-serif';
    ctx.fillStyle = '#484f58';
    ctx.fillText('HARDWARE COST', sbx + 320, sby + 60);

    // Author
    ctx.font = '400 15px system-ui, -apple-system, sans-serif';
    ctx.fillStyle = '#484f58';
    ctx.fillText('Abhinav Ranish \u00B7 Student @ Arizona State University', 100, 560);

    // Small badge: "p < 0.005"
    const bx = 700, by = 420;
    ctx.fillStyle = '#111620';
    ctx.strokeStyle = '#39ff1433';
    ctx.lineWidth = 1;
    roundRect(ctx, bx, by, 200, 50, 8);
    ctx.fill(); ctx.stroke();
    ctx.font = '600 13px "Courier New", monospace';
    ctx.fillStyle = '#39ff14';
    ctx.fillText('p < 0.005', bx + 20, by + 22);
    ctx.font = '400 11px system-ui, sans-serif';
    ctx.fillStyle = '#484f58';
    ctx.fillText('Statistically Significant', bx + 20, by + 40);

    // Second badge: "+16%"
    ctx.fillStyle = '#111620';
    ctx.strokeStyle = 'rgba(255,176,32,0.2)';
    roundRect(ctx, bx + 220, by, 180, 50, 8);
    ctx.fill(); ctx.stroke();
    ctx.font = '700 18px "Courier New", monospace';
    ctx.fillStyle = '#ffb020';
    ctx.fillText('+16%', bx + 240, by + 24);
    ctx.font = '400 11px system-ui, sans-serif';
    ctx.fillStyle = '#484f58';
    ctx.fillText('vs Single-Band', bx + 240, by + 40);

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // Download button
    document.getElementById('download').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'og-image.png';
      link.href = c.toDataURL('image/png');
      link.click();
    });
  </script>
</body>
</html>
